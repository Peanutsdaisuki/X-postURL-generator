<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XポストURLジェネレータ 投稿URLを作成</title>
    <meta name="description" content="入力した文章をX（旧Twitter）の投稿用URL（intent/post）に変換するツール。面倒な改行や空白のエンコード処理を自動で行い、シェア用リンクを簡単に生成できます。" >
    <link rel="stylesheet" href="style.css">
</head>
    
<body>

<div class="container">
    <h1>X ポストURLジェネレーター</h1>
    
    <div class="input-group">
        <label for="inputText">投稿テキスト（空白・改行・記号もそのまま入力OK）:</label>
        <textarea id="inputText" placeholder="ここに入力した文字がURLに変換されます..."></textarea>
        <div class="char-counter">文字数: <span id="charCount">0</span></div>
    </div>
    
    <div class="result-group">
        <label for="resultUrl">生成されたクエリURL:</label>
        <textarea id="resultUrl" readonly placeholder="変換結果がここに表示されます"></textarea>
        
        <div class="result-actions">
            <button id="copyBtn" class="btn-copy">URLをコピー</button>
            <button id="testBtn" class="btn-test">Xで開いてテスト</button>
        </div>
        <div id="toast" class="toast">URLをクリップボードにコピーしました!</div>
    </div>
</div>

<script src="script.js" defer></script>
</body>
</html>
